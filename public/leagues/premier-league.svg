<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Premier League Lion - Stylized -->
  <defs>
    <linearGradient id="pl-grad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#963CFF"/>
      <stop offset="100%" stop-color="#3d195b"/>
    </linearGradient>
  </defs>
  <!-- Lion head silhouette -->
  <g transform="translate(4, 2) scale(0.8)">
    <!-- Mane -->
    <path d="M20 4 C12 4 6 9 6 16 C6 18 7 20 8 21 C6 22 5 24 5 26 C5 30 8 34 12 36 L16 38 L20 39 L24 38 L28 36 C32 34 35 30 35 26 C35 24 34 22 32 21 C33 20 34 18 34 16 C34 9 28 4 20 4Z" fill="url(#pl-grad)"/>
    <!-- Face detail -->
    <path d="M14 16 C14 16 16 14 20 14 C24 14 26 16 26 16" stroke="#00ff85" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Eyes -->
    <circle cx="16" cy="18" r="1.5" fill="#fff"/>
    <circle cx="24" cy="18" r="1.5" fill="#fff"/>
    <!-- Nose -->
    <path d="M18 22 L20 24 L22 22" stroke="#fff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Crown -->
    <path d="M13 10 L16 6 L20 9 L24 6 L27 10" stroke="#00ff85" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Mane lines -->
    <path d="M8 14 C10 12 12 11 14 11" stroke="#963CFF" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M32 14 C30 12 28 11 26 11" stroke="#963CFF" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
</svg>
